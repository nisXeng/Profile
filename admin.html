<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Intel Admin – Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b0b10;
      --surface: #16161f;
      --border: rgba(255,255,255,.08);
      --text: #f4f4f7;
      --muted: #8b8b9a;
      --accent: #ff5e3a;
      --green: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; padding: 2rem; max-width: 1600px; margin: auto; }
    h1 { color: var(--accent); margin-bottom: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
    .hidden { display: none; }
    .btn { background: var(--accent); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 0.5rem 0; }
    .btn:hover { opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .error { color: var(--red); margin: 0.5rem 0; }
    .success { color: var(--green); margin: 0.5rem 0; }
    input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 1rem; border-radius: 8px; width: 100%; margin-bottom: 0.5rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .stat-card h3 { color: var(--muted); font-size: 0.9rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; white-space: nowrap; }
    th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 0.75rem; }
    tr:hover { background: rgba(255,255,255,0.02); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--surface); padding: 2rem; border-radius: 16px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid var(--border); }
    .close { float: right; cursor: pointer; font-size: 1.5rem; color: var(--muted); background: none; border: none; }
  </style>
</head>
<body>

  <!-- STATUS / DIAGNOSTIC BOX -->
  <div id="diagnostic" class="card"></div>

  <!-- LOGIN SECTION -->
  <div id="login-section" class="card">
    <h2>Manual Login</h2>
    <input type="email" id="email" placeholder="Email" value="admin@test.com" />
    <input type="password" id="password" placeholder="Password" value="TestAdmin123!" />
    <button class="btn" onclick="manualLogin()">Sign In</button>
    <button class="btn btn-outline" onclick="autoTestLogin()">🔧 Auto-Test with admin@test.com</button>
  </div>

  <!-- DASHBOARD (hidden until login) -->
  <div id="dashboard-section" class="hidden">
    <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
      <h1>Device Intelligence Dashboard</h1>
      <button class="btn btn-outline" onclick="logout()">Logout</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="controls">
      <input type="text" id="search" placeholder="Search..." oninput="filterData()" />
      <select id="filter-country" onchange="filterData()"><option value="">All Countries</option></select>
      <select id="filter-browser" onchange="filterData()"><option value="">All Browsers</option></select>
      <select id="filter-os" onchange="filterData()"><option value="">All OS</option></select>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
      <button class="btn" onclick="loadData()">Refresh</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead><tr>
          <th>Time</th><th>IP</th><th>Country</th><th>City</th><th>Browser</th>
          <th>OS</th><th>Device</th><th>GPS</th><th>Fingerprint</th><th>Actions</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div style="display: flex; gap: 2rem; margin-top: 2rem; flex-wrap: wrap;">
      <div style="width:100%; max-width:500px;"><canvas id="browserChart"></canvas></div>
      <div style="width:100%; max-width:500px;"><canvas id="osChart"></canvas></div>
    </div>
  </div>

  <div class="modal" id="json-modal">
    <div class="modal-content">
      <button class="close" onclick="document.getElementById('json-modal').style.display='none'">&times;</button>
      <pre id="modal-json" style="white-space: pre-wrap; font-size: 0.8rem;"></pre>
    </div>
  </div>

<script>
// ========== SUPABASE CONFIG ==========
const SUPABASE_URL = 'https://bpauwepxzhhdbyrslfob.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwYXV3ZXB4emhoZGJ5cnNsZm9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2Mzk1NzcsImV4cCI6MjA5OTIxNTU3N30.GqlmxTJh7u2NL43WSIhNJGhs1CAWNHLeTKeOJqMtNkI';

// ========== GLOBALS ==========
let supabase;
let allData = [];
let browserChart, osChart;

// ========== INIT CLIENT ==========
function initClient() {
  if (!supabase) supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ========== DIAGNOSTIC LOGGER ==========
function log(msg, type = 'info') {
  const box = document.getElementById('diagnostic');
  const color = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--text)';
  box.innerHTML += `<p style="color:${color};margin:0.3rem 0;">[${type}] ${msg}</p>`;
  console.log(`[${type}] ${msg}`);
}

// ========== AUTO‑TEST LOGIN ==========
async function autoTestLogin() {
  const diagnostic = document.getElementById('diagnostic');
  diagnostic.innerHTML = '<p style="color:var(--accent)">Running diagnostic login...</p>';
  initClient();
  
  try {
    // Test user
    const { data, error } = await supabase.auth.signInWithPassword({
      email: 'admin@test.com',
      password: 'TestAdmin123!'
    });
    
    if (error) {
      log(`Login failed: ${error.message} (status: ${error.status})`, 'error');
      // Check if user exists
      log('Attempting to create the test user...', 'info');
      // Try to sign up
      const { data: signupData, error: signupError } = await supabase.auth.signUp({
        email: 'admin@test.com',
        password: 'TestAdmin123!'
      });
      if (signupError) {
        log(`Sign-up failed: ${signupError.message}`, 'error');
      } else {
        log('Test user created! You may need to confirm email or disable email confirmation in Supabase.', 'success');
        log('Go to Authentication -> Providers -> Email and turn off "Confirm email" temporarily.', 'info');
      }
      return;
    }
    
    log('Login successful!', 'success');
    showDashboard();
    loadData();
    
  } catch (err) {
    log(`Unexpected error: ${err.message}`, 'error');
  }
}

// ========== MANUAL LOGIN ==========
async function manualLogin() {
  initClient();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) {
    log('Please enter both email and password', 'error');
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    log(`Login error: ${error.message}`, 'error');
    return;
  }
  
  log('Logged in as ' + data.user.email, 'success');
  showDashboard();
  loadData();
}

// ========== SHOW / HIDE SECTIONS ==========
function showDashboard() {
  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('dashboard-section').classList.remove('hidden');
}

function showLogin() {
  document.getElementById('login-section').classList.remove('hidden');
  document.getElementById('dashboard-section').classList.add('hidden');
}

// ========== LOGOUT ==========
async function logout() {
  await supabase.auth.signOut();
  showLogin();
}

// ========== LOAD DATA ==========
async function loadData() {
  const { data, error } = await supabase
    .from('device_logs')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (error) {
    log('Data fetch error: ' + error.message, 'error');
    return;
  }
  
  allData = data || [];
  updateStats(allData);
  populateFilters(allData);
  renderTable(allData);
  renderCharts(allData);
}

function updateStats(data) {
  const totalHits = data.length;
  const uniqueIPs = new Set(data.map(d => d.ip)).size;
  const uniqueFPs = new Set(data.map(d => d.fingerprint)).size;
  const today = new Date().toISOString().split('T')[0];
  const todayHits = data.filter(d => d.created_at?.startsWith(today)).length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><h3>Total Hits</h3><div class="value">${totalHits}</div></div>
    <div class="stat-card"><h3>Unique IPs</h3><div class="value">${uniqueIPs}</div></div>
    <div class="stat-card"><h3>Unique FPs</h3><div class="value">${uniqueFPs}</div></div>
    <div class="stat-card"><h3>Today</h3><div class="value">${todayHits}</div></div>
  `;
}

function populateFilters(data) {
  const fill = (id, field) => {
    const sel = document.getElementById(id);
    const vals = [...new Set(data.map(d => d[field]).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All</option>' + vals.map(v => `<option>${v}</option>`).join('');
  };
  fill('filter-country', 'country');
  fill('filter-browser', 'browser');
  fill('filter-os', 'os');
}

function filterData() {
  const search = document.getElementById('search').value.toLowerCase();
  const country = document.getElementById('filter-country').value;
  const browser = document.getElementById('filter-browser').value;
  const os = document.getElementById('filter-os').value;
  
  let filtered = allData;
  if (search) filtered = filtered.filter(d => Object.values(d).some(v => String(v).toLowerCase().includes(search)));
  if (country) filtered = filtered.filter(d => d.country === country);
  if (browser) filtered = filtered.filter(d => d.browser === browser);
  if (os) filtered = filtered.filter(d => d.os === os);
  
  renderTable(filtered);
}

function renderTable(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--muted);">No data</td></tr>';
    return;
  }
  data.forEach(d => {
    const gps = d.gps_latitude ? `${Number(d.gps_latitude).toFixed(4)}, ${Number(d.gps_longitude).toFixed(4)}` : 'N/A';
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${new Date(d.created_at).toLocaleString()}</td>
      <td>${d.ip || 'N/A'}</td>
      <td>${d.country || 'N/A'}</td>
      <td>${d.city || 'N/A'}</td>
      <td>${d.browser || 'N/A'}</td>
      <td>${d.os || 'N/A'}</td>
      <td>${d.device_type || 'N/A'}</td>
      <td>${gps}</td>
      <td title="${d.fingerprint}">${(d.fingerprint || '').substring(0,12)}…</td>
      <td>
        <button onclick="showJSON(${d.id})" style="color:var(--accent);background:none;border:none;cursor:pointer;">👁</button>
        <button onclick="deleteEntry(${d.id})" style="color:var(--red);background:none;border:none;cursor:pointer;">🗑</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const { error } = await supabase.from('device_logs').delete().eq('id', id);
  if (error) alert('Delete failed: ' + error.message);
  else loadData();
}

function showJSON(id) {
  const entry = allData.find(d => d.id === id);
  if (entry) {
    document.getElementById('modal-json').textContent = JSON.stringify(entry, null, 2);
    document.getElementById('json-modal').style.display = 'flex';
  }
}

function renderCharts(data) {
  const browserCount = {};
  data.forEach(d => { const b = d.browser || 'Unknown'; browserCount[b] = (browserCount[b]||0)+1; });
  if (browserChart) browserChart.destroy();
  browserChart = new Chart(document.getElementById('browserChart'), {
    type: 'bar',
    data: { labels: Object.keys(browserCount), datasets: [{ label: 'Browsers', data: Object.values(browserCount), backgroundColor: '#ff5e3a' }] },
    options: { plugins: { legend: { display: false } } }
  });
  
  const osCount = {};
  data.forEach(d => { const o = d.os || 'Unknown'; osCount[o] = (osCount[o]||0)+1; });
  if (osChart) osChart.destroy();
  osChart = new Chart(document.getElementById('osChart'), {
    type: 'bar',
    data: { labels: Object.keys(osCount), datasets: [{ label: 'OS', data: Object.values(osCount), backgroundColor: '#00e5d4' }] },
    options: { plugins: { legend: { display: false } } }
  });
}

function exportCSV() {
  const rows = allData.map(d => [d.created_at, d.ip, d.country, d.city, d.browser, d.os, d.device_type, d.gps_latitude, d.gps_longitude, d.fingerprint]);
  const csv = 'Timestamp,IP,Country,City,Browser,OS,Device,Lat,Lng,Fingerprint\n' + rows.map(r => r.map(v => `"${v||''}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'device_data.csv'; a.click();
}

// ========== CHECK EXISTING SESSION ==========
(async () => {
  initClient();
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    showDashboard();
    loadData();
  } else {
    // Try auto‑login with the test account
    log('No active session, trying auto-login with test account...', 'info');
    autoTestLogin();
  }
})();
</script>
</body>
</html>
